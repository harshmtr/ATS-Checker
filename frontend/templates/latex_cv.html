{% extends "base.html" %}

{% block content %}
<!-- CodeMirror CSS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">

<style>
    .editor-container {
        display: flex;
        height: calc(100vh - 80px);
        background: var(--bg-dark);
    }
    
    .editor-pane {
        flex: 1;
        display: flex;
        flex-direction: column;
        border-right: 1px solid var(--glass-border);
    }
    
    .preview-pane {
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 2rem;
        background: rgba(15, 23, 42, 0.9);
        color: var(--text-main);
    }
    
    .pane-header {
        padding: 1rem 2rem;
        background: rgba(30, 41, 59, 0.9);
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    
    .pane-header h3 {
        font-family: 'Outfit', sans-serif;
        color: var(--primary);
        font-size: 1.2rem;
    }
    
    .CodeMirror {
        flex: 1;
        height: 100%;
        font-family: 'Fira Code', monospace, sans-serif;
        font-size: 14px;
    }
    
    .preview-content {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 2px dashed var(--glass-border);
        border-radius: 12px;
        margin-top: 1rem;
        text-align: center;
        color: var(--text-muted);
    }
</style>

<div class="editor-container">
    <!-- Left Pane: LaTeX Code Editor -->
    <div class="editor-pane">
        <div class="pane-header">
            <h3>CV LaTeX Source</h3>
            <button class="btn-primary" style="padding: 0.4rem 1rem; font-size: 0.9rem;" onclick="downloadTex()">Download .tex</button>
        </div>
        <textarea id="latexEditor">\documentclass{article}
\usepackage[utf8]{inputenc}
\usepackage[margin=1in]{geometry}

\title{Curriculum Vitae}
\author{Dr. Your Name}
\date{May 2026}

\begin{document}

\maketitle

\section*{Education}
\textbf{Ph.D. in Computer Science} \\
University of Excellence \hfill 2020 - 2024

\section*{Research Experience}
\textbf{Postdoctoral Researcher} \\
Advanced AI Lab \hfill 2024 - Present
\begin{itemize}
    \item Conducted research on Large Language Models.
    \item Published 3 papers in top-tier conferences.
\end{itemize}

\end{document}
</textarea>
    </div>

    <!-- Right Pane: Preview / Compile Status -->
    <div class="preview-pane">
        <div class="pane-header" style="background: transparent; border-bottom: none; padding: 0; margin-bottom: 1rem;">
            <h3>Live Preview</h3>
            <button class="btn-primary" style="padding: 0.4rem 1rem; font-size: 0.9rem; background: var(--success);" onclick="compilePDF()">Compile to PDF</button>
        </div>
        <div class="preview-content glass-panel" style="padding: 0; position: relative; overflow: hidden; border: none; background: white;">
            <iframe id="pdfPreview" style="width: 100%; height: 100%; border: none; display: none;"></iframe>
            
            <div id="previewPlaceholder" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: var(--bg-dark);">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--bg-dark)" stroke-width="2" style="margin-bottom: 1rem; opacity: 0.5;">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                </svg>
                <p style="font-weight: 600; opacity: 0.7;">Click "Compile to PDF" to generate your CV</p>
            </div>

            <div id="loadingIndicator" style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: var(--bg-dark);">
                <p style="font-weight: 600;">Compiling via Server Proxy...</p>
                <p style="font-size: 0.85rem; opacity: 0.7; margin-top: 0.5rem;">This may take a few seconds.</p>
            </div>
        </div>
    </div>
</div>

<!-- CodeMirror Scripts -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/stex/stex.min.js"></script>
<script>
    // Initialize CodeMirror
    var editor = CodeMirror.fromTextArea(document.getElementById("latexEditor"), {
        lineNumbers: true,
        mode: "stex",
        theme: "dracula",
        lineWrapping: true
    });

    // Download .tex file function
    function downloadTex() {
        const text = editor.getValue();
        const blob = new Blob([text], { type: 'text/plain' });
        const anchor = document.createElement('a');
        anchor.download = "cv.tex";
        anchor.href = window.URL.createObjectURL(blob);
        anchor.click();
    }

    // Compile PDF via Server Proxy API
    async function compilePDF() {
        const text = editor.getValue();
        const iframe = document.getElementById("pdfPreview");
        const placeholder = document.getElementById("previewPlaceholder");
        const loader = document.getElementById("loadingIndicator");
        
        iframe.style.display = 'none';
        placeholder.style.display = 'none';
        loader.style.display = 'block';
        
        try {
            const response = await fetch('/api/compile', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    latex: text
                })
            });
            
            if (!response.ok) {
                const errorText = await response.text();
                throw new Error("Compilation failed. Status: " + response.status + " | " + errorText);
            }
            
            // The API returns the PDF as a blob
            const blob = await response.blob();
            const pdfUrl = URL.createObjectURL(blob);
            
            iframe.src = pdfUrl;
            iframe.onload = function() {
                loader.style.display = 'none';
                iframe.style.display = 'block';
            };
        } catch (error) {
            console.error("Error compiling PDF:", error);
            alert("Error compiling PDF. Check console for details.");
            loader.style.display = 'none';
            placeholder.style.display = 'block';
        }
    }
</script>
{% endblock %}
